<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BeArt Gallery - Royal Pet Portraits</title>
  <style>
    body { font-family: Georgia, serif; background: #1a0f0a; color: #d4af37; text-align: center; padding: 20px; }
    h1 { font-size: 2.5rem; margin: 20px 0 10px; }
    p { font-size: 1.1rem; opacity: 0.9; }
  .upload { margin: 30px 0; }
    input[type="file"] { display: none; }
  .btn { background: #d4af37; color: #1a0f0a; padding: 15px 30px; border: none; font-size: 1.2rem; cursor: pointer; font-weight: bold; border-radius: 5px; }
  .btn:active { transform: scale(0.95); }
    #status { margin: 25px 0; font-size: 1.1rem; min-height: 30px; font-style: italic; }
    #result { margin-top: 30px; }
    #result img { max-width: 90%; border: 10px solid #d4af37; box-shadow: 0 0 30px rgba(212,175,55,0.5); }
  .frame { background: #2a1f1a; padding: 20px; display: inline-block; margin-top: 20px; }
  </style>
</head>
<body>
  <h1>👑 BeArt Gallery 👑</h1>
  <p>Transform thy noble beast into royal art</p>

  <div class="upload">
    <label for="petInput" class="btn">Upload Thy Pet</label>
    <input type="file" id="petInput" accept="image/*">
  </div>

  <button class="btn" onclick="makePetLegendary()">Make My Pet Legendary</button>
  <div id="status"></div>
  <div id="result"></div>
  <audio id="trumpet" src="https://cdn.pixabay.com/audio/2022/03/15/audio_2b2d4b6b5c.mp3" preload="auto"></audio>

  <script>
    let base64Image = null;
    const status = document.getElementById('status');
    const result = document.getElementById('result');
    const trumpet = document.getElementById('trumpet');

    document.getElementById('petInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          base64Image = e.target.result;
          status.textContent = 'Pet loaded. Ready for royal treatment.';
        };
        reader.readAsDataURL(file);
      }
    });

    async function makePetLegendary() {
      if (!base64Image) {
        status.textContent = 'First, upload thy beast!';
        return;
      }

      // Play sound IMMEDIATELY so Chrome allows it
      status.textContent = 'Royal trumpets sound!';
      trumpet.currentTime = 0;
      trumpet.play().catch(err => console.log('Audio blocked:', err));

      setTimeout(() => {
        status.textContent = 'Summoning the royal artist... 20-30 seconds';
      }, 1500);

      result.innerHTML = '';

      try {
        const response = await fetch('/.netlify/functions/pet-picasso', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image: base64Image })
        });

        const data = await response.json();

        if (data.output) {
          result.innerHTML = `<div class="frame"><img src="${data.output}" alt="Royal Pet Portrait"></div>`;
          status.textContent = 'Behold! Thy masterpiece is complete!';
        } else {
          status.textContent = 'The royal artist is napping. Try again.';
          console.log('Replicate error:', data);
        }
      } catch (error) {
        status.textContent = 'Royal decree failed. Check connection.';
        console.log('Fetch error:', error);
      }
    }
  </script>
</body>
</html>
