<link rel="manifest" href="./manifest.json">
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .music-player {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
            padding: 40px 30px;
            text-align: center;
        }

        .album-art {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .song-info {
            margin-bottom: 30px;
        }

        .song-title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .song-artist {
            font-size: 14px;
            color: #999;
        }

        .progress-container {
            margin: 20px 0;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            cursor: pointer;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.1s linear;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }

        button {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        button:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: scale(0.95);
        }

        .play-btn {
            width: 70px;
            height: 70px;
            font-size: 28px;
        }

        .volume-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .volume-slider {
            width: 150px;
            height: 4px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .volume-icon {
            font-size: 18px;
            color: #667eea;
        }

        audio {
            display: none;
        }

        .playlist-toggle {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #e0e0e0;
        }

        .playlist-toggle button {
            width: auto;
            height: auto;
            padding: 10px 20px;
            font-size: 14px;
        }

        .playlist {
            margin-top: 20px;
            display: none;
            max-height: 200px;
            overflow-y: auto;
        }

        .playlist.show {
            display: block;
        }

        .playlist-item {
            padding: 10px;
            background: #f5f5f5;
            margin: 5px 0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            color: #333;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }

        .playlist-item:hover {
            background: #e8eaf6;
            border-left-color: #667eea;
        }

        .playlist-item.active {
            background: #667eea;
            color: white;
            border-left-color: #764ba2;
        }
    </style>
</head>
<body>
    <div class="music-player">
        <div class="album-art">🎵</div>
        
        <div class="song-info">
            <div class="song-title" id="songTitle">Add Your Music</div>
            <div class="song-artist" id="songArtist">Upload or add music files</div>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar">
                <div class="progress" id="progress"></div>
            </div>
            <div class="time-info">
                <span id="currentTime">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>

        <div class="controls">
            <button onclick="previousTrack()">⏮</button>
            <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
            <button onclick="nextTrack()">⏭</button>
        </div>

        <div class="volume-control">
            <span class="volume-icon">🔊</span>
            <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="70" oninput="changeVolume()">
        </div>

        <div class="playlist-toggle">
            <button onclick="togglePlaylist()">📋 Show Playlist</button>
            <div class="playlist" id="playlist"></div>
        </div>

        <audio id="audioPlayer"></audio>
    </div>

    <script>
        // Sample playlist - Replace with your music files
        const playlist = [
            {
                title: "Summer Vibes",
                artist: "Relaxing Music",
                file: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
            },
            {
                title: "Night Drive",
                artist: "Ambient Sounds",
                file: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"
            },
            {
                title: "Morning Energy",
                artist: "Upbeat Tracks",
                file: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"
            }
        ];

        let currentTrack = 0;
        let isPlaying = false;

        const audioPlayer = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        const songTitle = document.getElementById('songTitle');
        const songArtist = document.getElementById('songArtist');
        const progress = document.getElementById('progress');
        const progressBar = document.getElementById('progressBar');
        const currentTime = document.getElementById('currentTime');
        const duration = document.getElementById('duration');
        const volumeSlider = document.getElementById('volumeSlider');
        const playlistContainer = document.getElementById('playlist');

        // Load track
        function loadTrack(index) {
            if (playlist.length === 0) return;
            currentTrack = index % playlist.length;
            const track = playlist[currentTrack];
            audioPlayer.src = track.file;
            songTitle.textContent = track.title;
            songArtist.textContent = track.artist;
            updatePlaylistUI();
        }

        // Toggle play/pause
        function togglePlay() {
            if (isPlaying) {
                audioPlayer.pause();
                playBtn.textContent = '▶';
            } else {
                if (audioPlayer.src === '') loadTrack(0);
                audioPlayer.play();
                playBtn.textContent = '⏸';
            }
            isPlaying = !isPlaying;
        }

        // Next track
        function nextTrack() {
            loadTrack(currentTrack + 1);
            if (isPlaying) audioPlayer.play();
        }

        // Previous track
        function previousTrack() {
            loadTrack(currentTrack - 1);
            if (isPlaying) audioPlayer.play();
        }

        // Format time
        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        // Update progress bar
        audioPlayer.addEventListener('timeupdate', () => {
            const percent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
            progress.style.width = percent + '%';
            currentTime.textContent = formatTime(audioPlayer.currentTime);
        });

        // Update duration
        audioPlayer.addEventListener('loadedmetadata', () => {
            duration.textContent = formatTime(audioPlayer.duration);
        });

        // Click on progress bar
        progressBar.addEventListener('click', (e) => {
            const percent = e.offsetX / progressBar.offsetWidth;
            audioPlayer.currentTime = percent * audioPlayer.duration;
        });

        // Change volume
        function changeVolume() {
            audioPlayer.volume = volumeSlider.value / 100;
        }

        // Auto next track
        audioPlayer.addEventListener('ended', nextTrack);

        // Play ended
        audioPlayer.addEventListener('pause', () => {
            if (!audioPlayer.ended) isPlaying = false;
            playBtn.textContent = '▶';
        });

        audioPlayer.addEventListener('play', () => {
            isPlaying = true;
            playBtn.textContent = '⏸';
        });

        // Initialize playlist display
        function initPlaylist() {
            playlistContainer.innerHTML = '';
            playlist.forEach((track, index) => {
                const item = document.createElement('div');
                item.className = 'playlist-item' + (index === currentTrack ? ' active' : '');
                item.textContent = `${index + 1}. ${track.title}`;
                item.onclick = () => {
                    loadTrack(index);
                    audioPlayer.play();
                };
                playlistContainer.appendChild(item);
            });
        }

        // Update playlist UI
        function updatePlaylistUI() {
            document.querySelectorAll('.playlist-item').forEach((item, index) => {
                item.classList.toggle('active', index === currentTrack);
            });
        }

        // Toggle playlist visibility
        function togglePlaylist() {
            playlistContainer.classList.toggle('show');
        }

        // Initialize
        changeVolume();
        initPlaylist();
        loadTrack(0);
    </script>
</body>
</html>
