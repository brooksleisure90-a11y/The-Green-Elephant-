<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Be Art Pro</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6b35">
<style>
  body {
    margin: 0;
    padding: 20px;
    background: #0a0f0a;
    color: #e5e7eb;
    font-family: system-ui, -apple-system, sans-serif;
  }
.card {
    background: rgba(10, 15, 10, 0.8);
    border: 1px solid rgba(255, 107, 53, 0.3);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
  }
.camera-btn {
    width: 100%;
    padding: 50px 20px;
    border: 3px dashed #ff6b35;
    border-radius: 16px;
    background: rgba(255, 107, 53, 0.1);
    cursor: pointer;
    font-size: 18px;
    color: #ff6b35;
    font-weight: bold;
    font-family: inherit;
    transition: all 0.2s;
    margin-bottom: 12px;
  }
.camera-btn:active {
    background: rgba(255, 107, 53, 0.3);
    transform: scale(0.98);
  }
.gallery-btn {
    width: 100%;
    padding: 20px;
    border: 2px solid rgba(255, 107, 53, 0.5);
    border-radius: 16px;
    background: rgba(255, 107, 53, 0.05);
    cursor: pointer;
    font-size: 16px;
    color: #ff6b35;
    font-weight: bold;
    font-family: inherit;
    transition: all 0.2s;
  }
.gallery-btn:active {
    background: rgba(255, 107, 53, 0.2);
    transform: scale(0.98);
  }
.btn {
    padding: 16px;
    border: none;
    border-radius: 12px;
    font-weight: bold;
    cursor: pointer;
    font-size: 16px;
  }
.btn-primary {
    background: linear-gradient(135deg, #ff6b35, #f7931e);
    color: #000;
  }
.btn-secondary {
    background: #333;
    color: #fff;
  }
  #beArtVideo {
    width: 100%;
    border-radius: 12px;
    background: #000;
    max-height: 400px;
    object-fit: cover;
  }
  #beArtPreview {
    width: 100%;
    border-radius: 12px;
    margin-top: 16px;
  }
.gallery {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-top: 20px;
  }
.gallery-item {
    position: relative;
    border-radius: 8px;
    overflow: hidden;
  }
.gallery-item img {
    width: 100%;
    height: 120px;
    object-fit: cover;
    display: block;
  }
.gallery-actions {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
    padding: 8px;
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
  }
.gallery-item:hover.gallery-actions {
    opacity: 1;
  }
.action-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    border-radius: 6px;
    padding: 4px 6px;
    font-size: 14px;
    cursor: pointer;
    backdrop-filter: blur(10px);
  }
.action-btn:active {
    transform: scale(0.9);
  }
.edit-panel {
    background: #1a1a1a;
    border-radius: 12px;
    padding: 16px;
    margin-top: 16px;
    display: none;
  }
.edit-panel label {
    display: block;
    font-size: 12px;
    margin: 8px 0 4px;
    opacity: 0.8;
  }
.edit-panel input[type="range"] {
    width: 100%;
  }
</style>
</head>
<body>

<div class="card">
  <h3 style="font-size:20px;font-weight:bold;color:#ff6b35;margin:0 0 16px 0;display:flex;align-items:center;gap:8px">
    <span style="font-size:24px">🎨</span> Be Art Gallery Pro
  </h3>

  <button id="beArtCameraBtn" onclick="openBeArtCamera()" class="camera-btn">
    <div style="font-size:64px;margin-bottom:12px">📸</div>
    <div>SNAP YOUR ART</div>
    <div style="font-size:14px;opacity:0.7;margin-top:8px;font-weight:normal">Takes photo directly</div>
  </button>

  <input type="file" id="beArtFileInput" accept="image/*" style="display:none">
  <button onclick="document.getElementById('beArtFileInput').click()" class="gallery-btn">
    <div style="font-size:32px;margin-bottom:8px">🖼️</div>
    <div>OR UPLOAD FROM GALLERY</div>
    <div style="font-size:13px;opacity:0.7;margin-top:6px;font-weight:normal">Choose existing photo</div>
  </button>

  <div id="beArtCameraView" style="display:none;margin-top:16px">
    <video id="beArtVideo" autoplay playsinline></video>
    <div style="display:flex;gap:10px;margin-top:12px">
      <button onclick="captureBeArtPhoto()" class="btn btn-primary" style="flex:1">
        📸 CAPTURE
      </button>
      <button onclick="closeBeArtCamera()" class="btn btn-secondary" style="flex:1">
        ✕ CLOSE
      </button>
    </div>
  </div>

  <canvas id="beArtCanvas" style="display:none"></canvas>

  <div id="editPanel" class="edit-panel">
    <h4 style="margin:0 0 12px 0">🎨 Edit Image</h4>
    <img id="editPreview" style="width:100%;border-radius:8px;margin-bottom:12px">
    <label>Brightness: <span id="brightVal">100</span>%</label>
    <input type="range" id="brightness" min="0" max="200" value="100" oninput="applyFilters()">
    <label>Contrast: <span id="contrastVal">100</span>%</label>
    <input type="range" id="contrast" min="0" max="200" value="100" oninput="applyFilters()">
    <label>Saturate: <span id="saturateVal">100</span>%</label>
    <input type="range" id="saturate" min="0" max="200" value="100" oninput="applyFilters()">
    <label>Blur: <span id="blurVal">0</span>px</label>
    <input type="range" id="blur" min="0" max="10" value="0" oninput="applyFilters()">
    <div style="display:flex;gap:8px;margin-top:12px">
      <button onclick="saveEdit()" class="btn btn-primary" style="flex:1">💾 Save</button>
      <button onclick="closeEdit()" class="btn btn-secondary" style="flex:1">✕ Cancel</button>
    </div>
  </div>

  <div id="beArtStatus" style="margin-top:16px;text-align:center;font-size:14px"></div>
  <img id="beArtPreview" style="display:none">
  <div id="beArtGallery" class="gallery"></div>
</div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

let beArtStream = null;
let currentEditId = null;

async function openBeArtCamera() {
  const status = document.getElementById('beArtStatus');
  const video = document.getElementById('beArtVideo');
  const view = document.getElementById('beArtCameraView');
  const btn = document.getElementById('beArtCameraBtn');
  status.innerHTML = '<span style="color:#fbbf24">⏳ Opening camera...</span>';
  try {
    beArtStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user' },
      audio: false
    });
    video.srcObject = beArtStream;
    view.style.display = 'block';
    btn.style.display = 'none';
    status.innerHTML = '';
  } catch (err) {
    status.innerHTML = '<span style="color:#ef4444">❌ Camera blocked. Enable in App Settings → Permissions → Camera</span>';
  }
}

function captureBeArtPhoto() {
  const video = document.getElementById('beArtVideo');
  const canvas = document.getElementById('beArtCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);
  const dataUrl = canvas.toDataURL('image/jpeg', 1.0);
  saveBeArtImage(dataUrl, 'Camera');
  closeBeArtCamera();
  if (navigator.vibrate) navigator.vibrate(50);
}

function closeBeArtCamera() {
  const view = document.getElementById('beArtCameraView');
  const btn = document.getElementById('beArtCameraBtn');
  if (beArtStream) {
    beArtStream.getTracks().forEach(track => track.stop());
    beArtStream = null;
  }
  view.style.display = 'none';
  btn.style.display = 'block';
}

document.getElementById('beArtFileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const status = document.getElementById('beArtStatus');
  status.innerHTML = '<span style="color:#fbbf24">⏳ Processing...</span>';
  const reader = new FileReader();
  reader.onload = function(ev) {
    saveBeArtImage(ev.target.result, 'Gallery');
    status.innerHTML = '<span style="color:#22c55e;font-weight:bold">✓ Uploaded from gallery!</span>';
  };
  reader.readAsDataURL(file);
});

function saveBeArtImage(dataUrl, source) {
  const preview = document.getElementById('beArtPreview');
  preview.src = dataUrl;
  preview.style.display = 'block';
  try {
    const gallery = JSON.parse(localStorage.getItem('ads_beart_gallery') || '[]');
    gallery.unshift({
      id: Date.now(),
      src: dataUrl,
      source: source,
      timestamp: new Date().toISOString()
    });
    localStorage.setItem('ads_beart_gallery', JSON.stringify(gallery));
    renderBeArtGallery();
  } catch(e) {
    console.log('Storage error:', e);
  }
}

function downloadImage(id) {
  const gallery = JSON.parse(localStorage.getItem('ads_beart_gallery') || '[]');
  const item = gallery.find(i => i.id === id);
  if (!item) return;
  const a = document.createElement('a');
  a.href = item.src;
  a.download = `beart-${item.id}.jpg`;
  a.click();
  document.getElementById('beArtStatus').innerHTML = '<span style="color:#22c55e">✓ Downloaded! Google Photos will auto-backup if Downloads sync is on.</span>';
}

function deleteImage(id) {
  if (!confirm('Delete this image?')) return;
  let gallery = JSON.parse(localStorage.getItem('ads_beart_gallery') || '[]');
  gallery = gallery.filter(i => i.id!== id);
  localStorage.setItem('ads_beart_gallery', JSON.stringify(gallery));
  renderBeArtGallery();
  document.getElementById('beArtStatus').innerHTML = '<span style="color:#fbbf24">🗑️ Deleted</span>';
}

function openEdit(id) {
  const gallery = JSON.parse(localStorage.getItem('ads_beart_gallery') || '[]');
  const item = gallery.find(i => i.id === id);
  if (!item) return;
  currentEditId = id;
  document.getElementById('editPreview').src = item.src;
  document.getElementById('editPanel').style.display = 'block';
  document.getElementById('editPreview').style.filter = 'none';
  ['brightness','contrast','saturate','blur'].forEach(f => {
    document.getElementById(f).value = f === 'blur'? 0 : 100;
    document.getElementById(f + 'Val').textContent = f === 'blur'? 0 : 100;
  });
}

function applyFilters() {
  const b = document.getElementById('brightness').value;
  const c = document.getElementById('contrast').value;
  const s = document.getElementById('saturate').value;
  const bl = document.getElementById('blur').value;
  document.getElementById('brightVal').textContent = b;
  document.getElementById('contrastVal').textContent = c;
  document.getElementById('saturateVal').textContent = s;
  document.getElementById('blurVal').textContent = bl;
  document.getElementById('editPreview').style.filter =
    `brightness(${b}%) contrast(${c}%) saturate(${s}%) blur(${bl}px)`;
}

function saveEdit() {
  const canvas = document.getElementById('beArtCanvas');
  const img = document.getElementById('editPreview');
  const ctx = canvas.getContext('2d');
  canvas.width = img.naturalWidth;
  canvas.height = img.naturalHeight;
  ctx.filter = img.style.filter;
  ctx.drawImage(img, 0, 0);
  const dataUrl = canvas.toDataURL('image/jpeg', 1.0);
  let gallery = JSON.parse(localStorage.getItem('ads_beart_gallery') || '[]');
  const idx = gallery.findIndex(i => i.id === currentEditId);
  if (idx!== -1) gallery[idx].src = dataUrl;
  localStorage.setItem('ads_beart_gallery', JSON.stringify(gallery));
  renderBeArtGallery();
  closeEdit();
  document.getElementById('beArtStatus').innerHTML = '<span style="color:#22c55e">✓ Edit saved!</span>';
}

function closeEdit() {
  document.getElementById('editPanel').style.display = 'none';
  currentEditId = null;
}

function aiEdit(id) {
  const gallery = JSON.parse(localStorage.getItem('ads_beart_gallery') || '[]');
  const item = gallery.find(i => i.id === id);
  if (!item) return;
  const a = document.createElement('a');
  a.href = item.src;
  a.download = `beart-ai-edit-${item.id}.jpg`;
  a.click();
  alert('Image downloaded! Next:\n1. Open Meta AI\n2. Upload this image\n3. Prompt: "make this cyberpunk" or "remove background" or "add dramatic lighting"');
}

function renderBeArtGallery() {
  const gallery = JSON.parse(localStorage.getItem('ads_beart_gallery') || '[]');
  const container = document.getElementById('beArtGallery');
  container.innerHTML = gallery.slice(0, 12).map(item =>
    `<div class="gallery-item">
      <img src="${item.src}" alt="Art">
      <div class="gallery-actions">
        <button class="action-btn" onclick="downloadImage(${item.id})" title="Download">💾</button>
        <button class="action-btn" onclick="openEdit(${item.id})" title="Edit">✏️</button>
        <button class="action-btn" onclick="aiEdit(${item.id})" title="AI Edit">✨</button>
        <button class="action-btn" onclick="deleteImage(${item.id})" title="Delete">🗑️</button>
      </div>
    </div>`
  ).join('');
}

document.addEventListener('DOMContentLoaded', renderBeArtGallery);
</script>

</body>
</html>
